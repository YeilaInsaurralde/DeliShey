<div class="login-container container">

  <div class="card login-card">

    <h2>Crear Cuenta</h2>

    <p>Registrate en Deli Shey</p>

    <div class="alert alert-error" *ngIf="error">
      {{ error }}
    </div>

    <div class="alert alert-success" *ngIf="success">
      {{ success }}
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="form-group">

        <label>Nombre</label>

        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          required
        >

      </div>

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
        >

      </div>

      <div class="form-group">

        <label>Contraseña</label>

        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
        >

      </div>

      <button
        type="submit"
        class="btn-primary w-100"
      >
        Registrarse
      </button>

    </form>

  </div>

</div>
